<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juvania Bolos - Descontos</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="card-confeitaria">
        <img src="../img/bolo-brigadeiro.png" class="foto-bolo" alt="Bolo de Brigadeiro">
        <span>🍰 Bolos </span>
        <h1>Preço: <span class="valor-original">R$ 150,00</span></h1>
        <p>Desconto de <strong>10%</strong> aplicado hoje!</p>
        
        <a href="index.html" class="btn-voltar">Voltar</a>
        <button class="botao-desconto" id="btn-calcular">Gerar Recibo</button>

        <div id="recibo">
            <p>Valor do Desconto: <br><strong>R$ <span id="valor-desc"></span></strong></p>
            <p>Total a Pagar: <br><span class="destaque" id="total-final"></span></p>
        </div>
    </div>
    
    <script src="../js/scripts.js">

    </script>

</body>
</html>
